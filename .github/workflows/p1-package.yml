name: Package p1 desktop app

# 手动触发,一次性为 Windows / macOS / Linux 打包免安装可执行程序。
# 运行后在该次运行的 Artifacts 中下载各平台产物。
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: doclingo-p1-windows
          - os: macos-latest
            artifact: doclingo-p1-macos
          - os: ubuntu-latest
            artifact: doclingo-p1-linux
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: p1/packaging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build frontend
        working-directory: p1/frontend
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install Python build deps
        run: python -m pip install -r ../backend/requirements.txt pyinstaller

      - name: PyInstaller build
        run: pyinstaller --clean --noconfirm doclingo-p1.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: p1/packaging/dist/*
